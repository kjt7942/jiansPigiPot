<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>짠이용돈기입장 - 스마트 용돈 기입장</title>
    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="짠이용돈기입장">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="app-container">
        <!-- Desktop background decorative elements -->
        <div class="bg-glow bg-glow-1"></div>
        <div class="bg-glow bg-glow-2"></div>

        <!-- Main Phone Frame -->
        <div class="phone-frame">
            <!-- App Header -->
            <header class="app-header">
                <div class="logo-area">
                    <div class="logo-title">
                        <span class="logo-emoji">🐷</span>
                        <h1>짠이용돈기입장</h1>
                    </div>
                    <div class="header-actions">
                        <button class="btn-theme-toggle" id="settings-toggle-btn" title="설정">
                            <!-- Gear settings icon SVG -->
                            <svg viewBox="0 0 24 24" style="width:20px; height:20px; fill:currentColor;"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18 1.4-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                        </button>
                    </div>
                </div>
                <div class="balance-card">
                    <div class="balance-title">현재 가진 돈</div>
                    <div class="balance-amount" id="total-balance">0원</div>
                    <div class="balance-stats">
                        <div class="stat-item income">
                            <span class="stat-label">수입</span>
                            <span class="stat-val" id="header-income">+0원</span>
                        </div>
                        <div class="stat-divider"></div>
                        <div class="stat-item expense">
                            <span class="stat-label">지출</span>
                            <span class="stat-val" id="header-expense">-0원</span>
                        </div>
                    </div>
                </div>
                <!-- Month Selector -->
                <div class="month-selector">
                    <button class="btn-icon" id="prev-month-btn">
                        <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                    </button>
                    <span class="current-month-label" id="current-month-display">2026년 06월</span>
                    <button class="btn-icon" id="next-month-btn">
                        <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                    </button>
                </div>
            </header>

            <!-- Navigation Tabs -->
            <div class="nav-tabs">
                <button class="tab-btn active" data-tab="list-tab">
                    <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
                    <span>내역 목록</span>
                </button>
                <button class="tab-btn" data-tab="calendar-tab">
                    <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11z"/></svg>
                    <span>달력</span>
                </button>
                <button class="tab-btn" data-tab="stats-tab">
                    <svg viewBox="0 0 24 24"><path d="M11 2v20c-5.07-.5-9-4.79-9-10s3.93-9.5 9-10zm2.03 0v8.99H22c-.47-4.74-4.24-8.52-8.97-8.99zm0 11.01V22c4.74-.47 8.5-4.25 8.97-8.99h-8.97z"/></svg>
                    <span>분석 통계</span>
                </button>
            </div>

            <!-- Content Container -->
            <div class="content-body">
                
                <!-- TAB 1: LIST VIEW -->
                <div id="list-tab" class="tab-panel active">
                    <!-- Filters & Sort Options Grid -->
                    <div class="control-panel">
                        <!-- Type Filter -->
                        <div class="filter-type-group">
                            <button class="filter-btn active" data-filter="all">전체</button>
                            <button class="filter-btn" data-filter="expense">지출만</button>
                            <button class="filter-btn" data-filter="income">수입만</button>
                        </div>
                        
                        <!-- Sort Selector -->
                        <div class="sort-selector-wrapper">
                            <label for="sort-select">정렬:</label>
                            <select id="sort-select" class="sort-dropdown">
                                <option value="input-order">최근 기록순</option>
                                <option value="date-desc">날짜 최신순</option>
                                <option value="date-asc">날짜 오래된순</option>
                                <option value="amount-desc">금액 높은순</option>
                                <option value="amount-asc">금액 낮은순</option>
                                <option value="abc">가나다순 (메모)</option>
                                <option value="category">카테고리별</option>
                            </select>
                        </div>
                    </div>

                    <!-- Transaction List Container -->
                    <div class="list-wrapper" id="transaction-list-container">
                        <!-- Transactions will be generated here -->
                        <div class="empty-state">
                            <p>기록된 내역이 없습니다.</p>
                            <span>하단의 + / - 버튼으로 첫 내역을 기록해 보세요!</span>
                        </div>
                    </div>
                </div>

                <!-- TAB 2: CALENDAR VIEW -->
                <div id="calendar-tab" class="tab-panel">
                    <div class="calendar-wrapper">
                        <!-- Calendar Type Header: Daily/Weekly Summary Toggle -->
                        <div class="calendar-modes">
                            <button class="mode-btn active" id="cal-mode-monthly">월간 뷰</button>
                            <button class="mode-btn" id="cal-mode-weekly">주간 현황</button>
                        </div>

                        <!-- Monthly Grid -->
                        <div class="calendar-grid-container" id="calendar-view-container">
                            <div class="calendar-weekdays">
                                <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
                            </div>
                            <div class="calendar-days" id="calendar-days-grid">
                                <!-- Calendar days injected by JS -->
                            </div>
                        </div>

                        <!-- Weekly status summary view (hidden by default) -->
                        <div class="weekly-summary-view hidden" id="weekly-summary-container">
                            <!-- Weekly totals listing -->
                        </div>

                        <!-- Selected Date Transactions List -->
                        <div class="selected-date-transactions">
                            <h3 id="selected-date-title">선택된 날짜 내역</h3>
                            <div class="mini-list" id="selected-date-list">
                                <!-- Transaction list for selected day -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- TAB 3: STATS VIEW -->
                <div id="stats-tab" class="tab-panel">
                    <div class="stats-wrapper">
                        <!-- Chart Area -->
                        <div class="stats-section card">
                            <h3>이달의 지출 분류별 비중</h3>
                            <div class="chart-container">
                                <div class="chart-canvas-box">
                                    <svg viewBox="0 0 100 100" class="donut-chart" id="category-donut-chart">
                                        <!-- Ring segments dynamically created by JS -->
                                        <circle cx="50" cy="50" r="40" fill="transparent" stroke="var(--bg-light)" stroke-width="12"></circle>
                                    </svg>
                                    <div class="chart-center-text">
                                        <span class="label">총 지출</span>
                                        <span class="val" id="chart-total-expense">0원</span>
                                    </div>
                                </div>
                                <div class="chart-legend" id="chart-legend-container">
                                    <!-- Legends dynamic -->
                                </div>
                            </div>
                        </div>

                        <!-- Monthly Analysis Card -->
                        <div class="stats-section card">
                            <h3>소비 분석 피드백</h3>
                            <div class="analysis-feedback" id="analysis-feedback-text">
                                데이터를 추가하면 똑똑한 소비 피드백이 제공됩니다.
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Floating Action Bar -->
            <div class="floating-actions">
                <button class="action-btn calc-trigger-btn" id="open-calc-btn">
                    <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 14h-2v2h-2v-2H9v-2h2v-2h2v2h2v2zm0-6H7V9h10v2z"/></svg>
                    <span>계산기</span>
                </button>
                
                <div class="add-buttons-group">
                    <button class="btn-add income" id="add-income-btn">
                        <span class="symbol">+</span>
                        <span>수입 추가</span>
                    </button>
                    <button class="btn-add expense" id="add-expense-btn">
                        <span class="symbol">−</span>
                        <span>지출 추가</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- MODAL 1: ADD/EDIT TRANSACTION -->
        <div class="modal-overlay" id="transaction-modal">
            <div class="modal-sheet">
                <div class="modal-header">
                    <h2 id="modal-title">내역 추가</h2>
                    <button class="modal-close" id="close-modal-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="transaction-form" onsubmit="return false;">
                        <input type="hidden" id="trans-id">
                        <input type="hidden" id="trans-type" value="expense"> <!-- expense or income -->

                        <!-- Amount input with integration to calculator -->
                        <div class="form-group amount-group">
                            <label for="trans-amount">금액 *</label>
                            <div class="amount-input-wrapper">
                                <input type="number" id="trans-amount" placeholder="0" required min="1">
                                <span class="currency-label">원</span>
                                <button type="button" class="btn-mini-calc" id="modal-calc-btn" title="계산기 켜기">
                                    <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 14h-2v2h-2v-2H9v-2h2v-2h2v2h2v2zm0-6H7V9h10v2z"/></svg>
                                </button>
                            </div>
                        </div>

                        <!-- Date Picker (Full Width for easy tapping) -->
                        <div class="form-group">
                            <label for="trans-date-only">날짜 *</label>
                            <input type="date" id="trans-date-only" class="large-date-input" required>
                        </div>

                        <!-- Custom Time Picker Row -->
                        <div class="form-group time-row">
                            <div class="ampm-col">
                                <label>오전/오후</label>
                                <div class="ampm-group" id="trans-ampm-selector">
                                    <button type="button" class="ampm-btn active" data-value="AM">오전</button>
                                    <button type="button" class="ampm-btn" data-value="PM">오후</button>
                                </div>
                                <input type="hidden" id="trans-ampm" value="AM">
                            </div>
                            <div class="time-col">
                                <label>시간 *</label>
                                <div class="time-select-group">
                                    <select id="trans-hour">
                                        <option value="1">1시</option>
                                        <option value="2">2시</option>
                                        <option value="3">3시</option>
                                        <option value="4">4시</option>
                                        <option value="5">5시</option>
                                        <option value="6">6시</option>
                                        <option value="7">7시</option>
                                        <option value="8">8시</option>
                                        <option value="9">9시</option>
                                        <option value="10">10시</option>
                                        <option value="11">11시</option>
                                        <option value="12">12시</option>
                                    </select>
                                    <span class="time-separator">:</span>
                                    <div class="minute-input-wrapper">
                                        <input type="number" id="trans-minute" min="0" max="59" placeholder="00" required>
                                        <span class="minute-label">분</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Categories Section: Multi-select Grid -->
                        <div class="form-group">
                            <label>카테고리 선택 (복수 선택 가능)</label>
                            <div class="category-grid" id="modal-category-grid">
                                <!-- Generated from app.js based on Expense/Income -->
                            </div>
                            <div class="custom-category-input-wrapper hidden" id="custom-cat-input-box">
                                <label for="custom-category-text">기타 내용 입력:</label>
                                <input type="text" id="custom-category-text" placeholder="예: 문방구 오락실">
                            </div>
                        </div>

                        <!-- Description/Memo -->
                        <div class="form-group">
                            <label for="trans-memo">메모 / 내용</label>
                            <input type="text" id="trans-memo" placeholder="구체적인 내용을 남겨보세요.">
                        </div>

                        <!-- Payment Method -->
                        <div class="form-group">
                            <label>결제/보관 수단</label>
                            <div class="payment-method-group" id="payment-method-selector">
                                <button type="button" class="pay-method-btn" data-value="cash">🪙 현금</button>
                                <button type="button" class="pay-method-btn" data-value="card">💳 카드</button>
                                <button type="button" class="pay-method-btn" data-value="bank">🏦 계좌이체</button>
                            </div>
                            <input type="hidden" id="trans-payment" value="card">
                        </div>

                        <!-- Buttons -->
                        <div class="form-actions">
                            <button type="button" class="btn-cancel" id="cancel-modal-btn">취소</button>
                            <button type="submit" class="btn-save" id="save-transaction-btn">저장하기</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- MODAL 2: INTEGRATED CALCULATOR DRAWER -->
        <div class="calc-drawer" id="calculator-drawer">
            <div class="calc-drawer-header">
                <h3>계산기</h3>
                <button class="calc-close" id="close-calc-drawer-btn">&times;</button>
            </div>
            <div class="calc-display">
                <div class="calc-expression" id="calc-exp-display"></div>
                <div class="calc-result" id="calc-val-display">0</div>
            </div>
            <div class="calc-keypad">
                <button class="calc-key btn-operator" data-action="clear">C</button>
                <button class="calc-key btn-operator" data-action="backspace">⌫</button>
                <button class="calc-key btn-operator" data-val="/">÷</button>
                <button class="calc-key btn-operator" data-val="*">×</button>

                <button class="calc-key" data-val="7">7</button>
                <button class="calc-key" data-val="8">8</button>
                <button class="calc-key" data-val="9">9</button>
                <button class="calc-key btn-operator" data-val="-">−</button>

                <button class="calc-key" data-val="4">4</button>
                <button class="calc-key" data-val="5">5</button>
                <button class="calc-key" data-val="6">6</button>
                <button class="calc-key btn-operator" data-val="+">+</button>

                <button class="calc-key" data-val="1">1</button>
                <button class="calc-key" data-val="2">2</button>
                <button class="calc-key" data-val="3">3</button>
                <button class="calc-key btn-apply" id="calc-apply-btn">입력</button>

                <button class="calc-key double-width" data-val="0">0</button>
                <button class="calc-key" data-val=".">.</button>
            </div>
        </div>
        <!-- MODAL 3: SETTINGS MODAL -->
        <div class="modal-overlay" id="settings-modal">
            <div class="modal-sheet">
                <div class="modal-header">
                    <h2>설정 및 데이터 관리</h2>
                    <button class="modal-close" id="close-settings-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <!-- Theme Selector Section inside Settings -->
                    <div class="settings-section-block">
                        <h3 class="settings-section-title">화면 테마 설정</h3>
                        <div class="theme-select-row">
                            <button type="button" class="theme-card-btn" id="settings-theme-dark">
                                <span class="theme-icon">🌙</span>
                                <span class="theme-label">다크 모드</span>
                            </button>
                            <button type="button" class="theme-card-btn" id="settings-theme-light">
                                <span class="theme-icon">☀️</span>
                                <span class="theme-label">라이트 모드</span>
                            </button>
                        </div>
                    </div>
                    
                    <!-- Data Reset Section -->
                    <div class="settings-section-block danger-zone">
                        <h3 class="settings-section-title">데이터 초기화</h3>
                        <p class="settings-info-text">초기화 시 지금까지 입력한 모든 수입/지출 내역과 설정이 기기에서 삭제되며 복구할 수 없습니다.</p>
                        <button type="button" class="btn-reset-data" id="reset-data-btn">
                            <svg viewBox="0 0 24 24" style="width:18px; height:18px; fill:currentColor; margin-right:4px;"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                            <span>모든 데이터 삭제 및 초기화</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
    </div>

    <!-- Application Script & PWA Registration -->
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered successfully!', reg.scope))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
